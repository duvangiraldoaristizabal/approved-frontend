<a class="back" routerLink="/requests">&larr; Volver a solicitudes</a><div class="title"><p class="eyebrow">Nueva solicitud</p><h1>Solicitar una aprobacion</h1></div><form [formGroup]="form" (ngSubmit)="submit()"><div class="grid"><label class="wide">Titulo<input formControlName="title" placeholder="Ej. Publicar pagos v2">@if(form.controls.title.touched && form.controls.title.invalid){<small>Ingrese entre 3 y 120 caracteres.</small>}</label><label>Solicitante<input formControlName="requester"></label><label>Responsable<input formControlName="approver" placeholder="usuario.red o correo@dominio.com">@if(form.controls.approver.touched && form.controls.approver.invalid){<small>El responsable es obligatorio.</small>}</label><label class="wide">Tipo<select formControlName="type"><option value="DEPLOYMENT">Despliegue</option><option value="ACCESS">Acceso</option><option value="TECHNICAL_CHANGE">Cambio tecnico</option><option value="TOOL_ONBOARDING">Incorporacion de herramienta</option><option value="OTHER">Otro</option></select></label><label class="wide">Descripcion<textarea formControlName="description" rows="7" placeholder="Contexto, alcance y resultado esperado"></textarea>@if(form.controls.description.touched && form.controls.description.invalid){<small>Incluya al menos 10 caracteres.</small>}</label></div>@if(error()){<p class="error">{{error()}}</p>}<footer><a routerLink="/requests">Cancelar</a><button [disabled]="saving()">{{ saving() ? 'Creando...' : 'Crear solicitud' }}</button></footer></form>
